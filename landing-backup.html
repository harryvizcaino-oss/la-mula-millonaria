<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trucker Surfers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0a1a3a;
            font-family: 'Arial Black', Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            text-align: center;
            text-shadow: 4px 4px 0px #ff6600;
            letter-spacing: 4px;
            margin-bottom: 60px;
        }

        .btn-jugar {
            padding: 20px 80px;
            font-size: 2rem;
            font-weight: bold;
            color: #0a1a3a;
            background-color: #ffcc00;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #cc9900;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-jugar:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #cc9900;
        }

        .btn-jugar:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #cc9900;
        }
    </style>
</head>
<body>
    <h1>TRUCKER SURFERS</h1>
    <button class="btn-jugar">JUGAR</button>
</body>
</html>

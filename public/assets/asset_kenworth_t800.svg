<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="kwCab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <linearGradient id="kwTrailer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#CC7A00"/>
    </linearGradient>
    <linearGradient id="kwWindow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#4682B4"/>
    </linearGradient>
  </defs>

  <!-- Trailer -->
  <rect x="140" y="60" width="140" height="80" rx="8" fill="url(#kwTrailer)" stroke="#B8860B" stroke-width="2"/>
  <rect x="145" y="65" width="130" height="70" rx="6" fill="none" stroke="#FFF" stroke-width="1" opacity="0.3"/>

  <!-- Cab -->
  <rect x="20" y="50" width="130" height="90" rx="12" fill="url(#kwCab)" stroke="#B8860B" stroke-width="2"/>

  <!-- Windshield -->
  <rect x="35" y="60" width="100" height="35" rx="6" fill="url(#kwWindow)" stroke="#2F4F4F" stroke-width="1.5"/>

  <!-- Eyes -->
  <ellipse cx="65" cy="77" rx="12" ry="14" fill="#FFF"/>
  <ellipse cx="105" cy="77" rx="12" ry="14" fill="#FFF"/>
  <circle cx="68" cy="80" r="6" fill="#1A1A2E"/>
  <circle cx="108" cy="80" r="6" fill="#1A1A2E"/>
  <circle cx="70" cy="77" r="2.5" fill="#FFF"/>
  <circle cx="110" cy="77" r="2.5" fill="#FFF"/>

  <!-- Smile -->
  <path d="M 75 95 Q 85 105 95 95" stroke="#1A1A2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Grill -->
  <rect x="45" y="115" width="80" height="15" rx="4" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  <line x1="55" y1="115" x2="55" y2="130" stroke="#808080" stroke-width="1.5"/>
  <line x1="70" y1="115" x2="70" y2="130" stroke="#808080" stroke-width="1.5"/>
  <line x1="85" y1="115" x2="85" y2="130" stroke="#808080" stroke-width="1.5"/>
  <line x1="100" y1="115" x2="100" y2="130" stroke="#808080" stroke-width="1.5"/>
  <line x1="115" y1="115" x2="115" y2="130" stroke="#808080" stroke-width="1.5"/>

  <!-- Bumper -->
  <rect x="15" y="135" width="140" height="12" rx="4" fill="#A9A9A9" stroke="#696969" stroke-width="1"/>

  <!-- Wheels -->
  <circle cx="70" cy="155" r="22" fill="#2F2F2F" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="70" cy="155" r="12" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  <circle cx="70" cy="155" r="5" fill="#696969"/>

  <circle cx="210" cy="155" r="22" fill="#2F2F2F" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="210" cy="155" r="12" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  <circle cx="210" cy="155" r="5" fill="#696969"/>

  <!-- Exhaust -->
  <rect x="130" y="40" width="8" height="20" rx="2" fill="#696969"/>
  <ellipse cx="134" cy="38" rx="6" ry="4" fill="#A9A9A9"/>
</svg>
